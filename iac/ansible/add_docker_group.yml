- name: Add user to docker group
  hosts: all
  become: true

  vars:
    username: "{{ username }}"

  tasks:
    - name: Add user to docker group
      command: sudo usermod -aG docker {{ username }}
      notify: Restart Docker

    - name: Verify user is in docker group
      command: groups {{ username }}
      register: group_check
      changed_when: "'docker' not in group_check.stdout"

  handlers:
    - name: Restart Docker
      service:
        name: docker
        state: restarted
