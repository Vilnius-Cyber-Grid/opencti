name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref_name }}-deployment
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: self-hosted
    env:
      COMPOSE: docker compose -f docker-compose.yml
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show images compose will pull
        run: $COMPOSE config --images

      - name: Pull images
        run: $COMPOSE pull

      - name: Copy servers ssl certs
        run: |
          sudo cp ${{ secrets.SSL_CERT_PATH_UBUNTU_24 }} ${{ github.workspace }}/docker/nginx/ssl/cert.pem
          sudo cp ${{ secrets.SSL_CERT_KEY_PATH_UBUNTU_24 }} ${{ github.workspace }}/docker/nginx/ssl/key.pem

      - name: Prepare Nginx configuration
        uses: cuchi/jinja2-action@v1.3.0
        with:
          template: docker/templates/nginx/nginx-site.conf.j2
          output_file: docker/nginx/nginx.conf
          strict: true
          variables: |
            domain_name="${{ vars.DOMAIN_NAME }}.${{ vars.VILNIUS_CYBER_GRID_DOMAIN }}"

      - name: Set .env file
        run: |
          cat << 'EOF' > .env
          ${{ secrets.ENV }}
          EOF

      - name: Down old containers
        run: $COMPOSE down --remove-orphans

      - name: Up and running new containers
        run: $COMPOSE up -d --build --remove-orphans

      - name: Cleanup unused Docker resources
        run: |
          echo "Pruning unused Docker images..."
          docker image prune -af --filter "until=24h"
          echo "Pruning unused Docker volumes..."
          docker volume prune -f
          echo "Pruning unused Docker networks..."
          docker network prune -f
          echo "Pruning build cache..."
          docker builder prune -af --filter "until=24h"
          echo "Disk usage after cleanup:"
          docker system df
